name: Random Header

on:
  workflow_dispatch:

  schedule:
    - cron: "0 * * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - run: python scripts/generate_header.py

      - name: Update README
        run: |
          python << EOF
          import re

          readme = open("README.md", encoding="utf8").read()
          header = open("generated_header.md", encoding="utf8").read()

          pattern = r'<!-- HEADER START -->.*?<!-- HEADER END -->'

          new = f'<!-- HEADER START -->\n{header}\n<!-- HEADER END -->'

          readme = re.sub(pattern, new, readme, flags=re.S)

          open("README.md","w",encoding="utf8").write(readme)
          EOF

      - name: Commit
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git add README.md
          git commit -m "Random Header" || exit 0
          git push